services:
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
            target: dev
        ports:
            - '${APP_PORT:-80}:8000'
            - '${APP_SSL_PORT:-443}:433'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
        volumes:
            - .:/app
            # - storage-volume:/app/storage/app  # Uncomment for NFS/external volume
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - sail

    mysql:
        image: mysql:8.4
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_DATABASE: '${DB_DATABASE:-ark_core}'
        ports:
            - '${DB_PORT:-3306}:3306'
        volumes:
            - sail-mysql:/var/lib/mysql
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD:-password}']
            retries: 3
            timeout: 5s
        networks:
            - sail

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - '${REDIS_PORT:-6379}:6379'
        volumes:
            - sail-redis:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            retries: 3
            timeout: 5s
        networks:
            - sail

volumes:
    sail-mysql:
    sail-redis:
    # NFS volume example — uncomment and configure for production:
    # storage-volume:
    #     driver: local
    #     driver_opts:
    #         type: nfs
    #         o: addr=${NFS_SERVER_ADDR},nolock,soft,rw
    #         device: ':${NFS_SERVER_PATH}'

networks:
    sail:
        driver: bridge
