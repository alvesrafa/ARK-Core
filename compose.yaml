services:
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
            target: production
        restart: unless-stopped
        volumes:
            - .:/var/www/html
        depends_on:
            mysql:
                condition: service_healthy
        networks:
            - ark-network

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - '${APP_PORT:-80}:80'
        volumes:
            - .:/var/www/html
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - ark-network

    mysql:
        image: mysql:8.4
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_DATABASE: '${DB_DATABASE:-ark_core}'
        ports:
            - '${DB_PORT:-3306}:3306'
        volumes:
            - mysql-data:/var/lib/mysql
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD:-password}']
            retries: 3
            timeout: 5s
        networks:
            - ark-network

volumes:
    mysql-data:

networks:
    ark-network:
        driver: bridge
